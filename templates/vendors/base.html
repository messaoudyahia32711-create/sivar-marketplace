<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم التاجر</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #212529;
            color: white;
            position: fixed;
            width: 220px;
            right: 0;
            top: 0;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
            border-bottom: 1px solid #343a40;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background-color: #0d6efd;
            color: white;
        }

        .main-content {
            margin-right: 220px;
            padding: 20px;
        }
    </style>

    <!-- كتلة لاستقبال CSS الإضافي من الصفحات الفرعية -->
    {% block extra_css %}{% endblock %}
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <!-- القائمة الجانبية -->
            <div class="col-md-2 sidebar p-0">
                <h4 class="text-center py-3 border-bottom border-secondary">لوحة التاجر</h4>
                <a href="{% url 'vendors:dashboard' %}">🏠 الرئيسية</a>
                <a href="{% url 'vendors:product_list' %}">📦 منتجاتي</a>
                <a href="#">📊 الطلبات</a>
                <a href="{% url 'vendors:logout' %}">🚪 خروج</a>
            </div>

            <!-- المحتوى الرئيسي -->
            <div class="col-md-10 main-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- كتلة لاستقبال Javascript الإضافي من الصفحات الفرعية -->
    {% block extra_js %}{% endblock %}
</body>

</html>
