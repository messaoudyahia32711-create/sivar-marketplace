<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول الموحد - SIVAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0F0F0F; color: white; margin: 0; }
        .role-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .role-card.active {
            border-color: #D4AF37;
            background: rgba(212, 175, 55, 0.1);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2);
        }
        .role-card.active i {
            color: #D4AF37;
        }
        .role-card.active span {
            color: #D4AF37;
            font-weight: 900;
        }
    </style>
</head>
<body>
<div class="min-h-screen flex items-center justify-center relative py-12 overflow-hidden bg-[#0F0F0F]">
    <!-- Background Effects -->
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-[#D4AF37]/10 rounded-full blur-[120px] -z-10 mix-blend-screen pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-[600px] h-[600px] bg-blue-900/10 rounded-full blur-[120px] -z-10 mix-blend-screen pointer-events-none"></div>

    <div class="w-full max-w-2xl px-4 relative z-10" dir="rtl">
        <!-- Header -->
        <div class="text-center mb-8">
            <a href="{% url 'home' %}" class="inline-block mb-4 group">
                <img src="/static/img/sivar_logo.png" alt="Sivar" class="h-28 mx-auto object-contain drop-shadow-[0_0_25px_rgba(212,175,55,0.4)] group-hover:scale-105 transition-transform duration-500">
            </a>
            <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-l from-[#D4AF37] to-[#F7E7CE] mb-2 tracking-wide">تسجيل الدخول للمنصة</h1>
            <p class="text-gray-400 text-sm">اختر نوع الحساب وقم بتسجيل الدخول للوصول إلى لوحتك</p>
        </div>

        <!-- Role Selection Grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <!-- Customer -->
            <div onclick="selectRole('CUSTOMER', this)" class="role-card active cursor-pointer bg-[#141414] rounded-2xl p-4 text-center group">
                <div class="w-12 h-12 bg-[#1A1A1A] rounded-xl flex items-center justify-center mx-auto mb-3 transition-colors duration-300">
                    <i class="fas fa-user-circle text-2xl text-gray-500 transition-colors"></i>
                </div>
                <span class="text-sm font-bold text-gray-400 transition-colors">زبون</span>
            </div>
            <!-- Vendor -->
            <div onclick="selectRole('VENDOR', this)" class="role-card cursor-pointer bg-[#141414] rounded-2xl p-4 text-center group">
                <div class="w-12 h-12 bg-[#1A1A1A] rounded-xl flex items-center justify-center mx-auto mb-3 transition-colors duration-300">
                    <i class="fas fa-store text-2xl text-gray-500 transition-colors"></i>
                </div>
                <span class="text-sm font-bold text-gray-400 transition-colors">تاجر</span>
            </div>
            <!-- Institution -->
            <div onclick="selectRole('INSTITUTION', this)" class="role-card cursor-pointer bg-[#141414] rounded-2xl p-4 text-center group">
                <div class="w-12 h-12 bg-[#1A1A1A] rounded-xl flex items-center justify-center mx-auto mb-3 transition-colors duration-300">
                    <i class="fas fa-building text-2xl text-gray-500 transition-colors"></i>
                </div>
                <span class="text-sm font-bold text-gray-400 transition-colors">مؤسسة</span>
            </div>
            <!-- Incubator -->
            <div onclick="selectRole('INCUBATOR', this)" class="role-card cursor-pointer bg-[#141414] rounded-2xl p-4 text-center group">
                <div class="w-12 h-12 bg-[#1A1A1A] rounded-xl flex items-center justify-center mx-auto mb-3 transition-colors duration-300">
                    <i class="fas fa-shield-alt text-2xl text-gray-500 transition-colors"></i>
                </div>
                <span class="text-sm font-bold text-gray-400 transition-colors">حاضنة</span>
            </div>
        </div>

        <!-- Glass Box Form -->
        <div class="max-w-md mx-auto bg-[#141414]/90 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-[#D4AF37]/50 to-transparent"></div>

            <form id="loginForm" class="space-y-6">
                <div id="errorAlert" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-sm px-4 py-3 rounded-xl mb-4 transition-all"></div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium text-gray-300 mb-1">اسم المستخدم</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-gray-400 group-focus-within:text-[#D4AF37] transition-colors">
                            <i class="fas fa-user text-sm"></i>
                        </div>
                        <input type="text" id="username" name="username" required 
                               class="w-full bg-[#0F0F0F] border border-white/10 rounded-xl py-3 pr-11 pl-4 text-white focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37] transition-all outline-none"
                               placeholder="أدخل اسم المستخدم...">
                    </div>
                </div>

                <div class="space-y-2 mt-4">
                    <div class="flex items-center justify-between mb-1">
                        <label class="block text-sm font-medium text-gray-300">كلمة المرور</label>
                        <a href="#" class="text-xs text-[#D4AF37] hover:text-white transition-colors">نسيت كلمة المرور؟</a>
                    </div>
                    <div class="relative group">
                        <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-gray-400 group-focus-within:text-[#D4AF37] transition-colors">
                            <i class="fas fa-lock text-sm"></i>
                        </div>
                        <input type="password" id="password" name="password" required 
                               class="w-full bg-[#0F0F0F] border border-white/10 rounded-xl py-3 pr-11 pl-4 text-white focus:border-[#D4AF37] focus:ring-1 focus:ring-[#D4AF37] transition-all outline-none"
                               placeholder="أدخل كلمة المرور...">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full relative group overflow-hidden rounded-xl pt-[2px] pr-[2px] pb-[2px] pl-[2px] shadow-[0_0_20px_rgba(212,175,55,0.15)] hover:shadow-[0_0_30px_rgba(212,175,55,0.3)] transition-all duration-300 mt-8">
                    <span class="absolute inset-0 bg-gradient-to-r from-[#D4AF37] to-[#8A7322] rounded-xl opacity-80 group-hover:opacity-100 transition-opacity"></span>
                    <div class="relative flex items-center justify-center gap-2 bg-[#1A1A1A] group-hover:bg-transparent rounded-[10px] py-4 transition-colors duration-300">
                        <span class="text-[#D4AF37] group-hover:text-[#0F0F0F] font-bold tracking-wide transition-colors" id="btnText">دخول عبر حساب <span id="selectedRoleText">زبون</span></span>
                        <i class="fas fa-sign-in-alt text-[#D4AF37] group-hover:text-[#0F0F0F] text-sm transition-colors" id="btnIcon"></i>
                        <svg id="btnLoader" class="hidden animate-spin h-5 w-5 text-[#D4AF37]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>
                </button>
            </form>
            
            <!-- Admin Login -->
            <div class="mt-6 pt-6 border-t border-white/5">
                <a href="/admin/" class="block w-full py-3 px-4 bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 hover:border-red-500/40 rounded-xl text-center text-red-400 font-bold transition-all duration-300">
                    <i class="fas fa-user-shield ml-2"></i>
                    🔑 فضاء الإدارة والمشرفين
                </a>
            </div>
            
            <div class="mt-8 text-center text-sm text-gray-400 border-t border-white/5 pt-6">
                لا تملك حساباً؟ 
                <a href="{% url 'register' %}" class="text-[#D4AF37] hover:text-white font-bold transition-colors underline decoration-transparent hover:decoration-[#D4AF37] underline-offset-4">قم بإنشاء حساب جديد</a>
            </div>
        </div>
    </div>
</div>

<script>
    let currentRole = 'CUSTOMER';
    const roleMap = {
        'CUSTOMER': 'زبون',
        'VENDOR': 'تاجر',
        'INSTITUTION': 'مؤسسة',
        'INCUBATOR': 'حاضنة'
    };

    function selectRole(role, element) {
        currentRole = role;
        // Update UI
        document.querySelectorAll('.role-card').forEach(card => card.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('selectedRoleText').innerText = roleMap[role];
    }

    document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("loginForm");
        const errorAlert = document.getElementById("errorAlert");
        const btnText = document.getElementById("btnText");
        const btnIcon = document.getElementById("btnIcon");
        const btnLoader = document.getElementById("btnLoader");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorAlert.classList.add("hidden");
            btnText.classList.add("hidden");
            btnIcon.classList.add("hidden");
            btnLoader.classList.remove("hidden");
            
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            try {
                const response = await fetch('/api/users/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Logic handles the actual returned role, but selection gives a better UX
                    const role = data.user.role;
                    const token = data.token;
                    
                    if (role === 'VENDOR' || role === 'SELLER') {
                        window.location.href = `http://localhost:5175/login?token=${token}`;
                    } else if (role === 'INSTITUTION') {
                        window.location.href = `http://localhost:5174/login?token=${token}`;
                    } else if (role === 'CUSTOMER') {
                        window.location.href = `http://localhost:5176/login?token=${token}`;
                    } else if (role === 'INCUBATOR') {
                        window.location.href = `http://localhost:5177/login?token=${token}`;
                    } else if (data.user.is_superuser) {
                        window.location.href = `/admin/`;
                    } else {
                        window.location.href = `/`;
                    }
                } else {
                    errorAlert.textContent = data.message || "خطأ في اسم المستخدم أو كلمة المرور";
                    errorAlert.classList.remove("hidden");
                }
            } catch (err) {
                errorAlert.textContent = "فشل الاتصال بالمنصة. يرجى المحاولة لاحقاً.";
                errorAlert.classList.remove("hidden");
            } finally {
                btnLoader.classList.add("hidden");
                btnText.classList.remove("hidden");
                btnIcon.classList.remove("hidden");
            }
        });
    });
</script>
</body>
</html>
